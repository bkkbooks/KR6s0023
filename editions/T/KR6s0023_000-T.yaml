body:
  text: 唐梵文字一卷夫欲𭮧識兩國言音者須是師資相乘或是西國人亦須曉解悉曇童梵漢之語者或是博學君子欲得作學漢梵之語者悉曇文字五天音旨不出此途傅大瑜伽教千歲阿闍梨方傅流通此地並是中天音韻最密要文字出自聲明論本但有學唐梵之語者得此為首餘語皆通梵漢兩本同學習者細用其心一二年間即堪翻譯兩國言音字義同美夫欲翻譯持念習瑜伽行者先令精凍此文梵漢雙譯梵字漢字漢識梵言梵呼漢字者或多或並有二合三合或單或䨱但看字母音韻具在別卷聲韻兩段理令諸家有元之教乃各題名目下量漢字智者鑒詳傅於後代傅五部瑜伽持念教北平八力子全真集

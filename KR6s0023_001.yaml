body:
  text: 唐梵兩國言􅁤音文字一卷􅁤􅖱天地􅝩日月陰陽圓矩晝夜明暗􅗭雷電風􅞻雨星流雲散往來去取東􅁎西南北上下􅋌相輔􅁥君臣僕使貴賤童竪刊定品物策立州􅁥主􅁤辨教禮書􅁥置設衛府父母兄弟孝􅚼讓弘撫甥舅異鄰伯叔同聚奉事友朋不懌貪窶山庭軒蓋淨野華柱美景千秋嘉傳萬古男女迎嫁喚命招􅞻追買賣市店出入俗緇交馳商貨妍醜強羸先蒙少贈今酬重遺一聞砥礪再想􅟓藏規謹身節儉離此面誰降希惡滅常敦福􅁤綏禍如響應善若影隨圖名璀㻮積行藏蕤如欽睿哲猶裏聲錐咸京遵德龜啓神師講道論妙激揚理􅚼致文參疊席聰過閲肆玉砌推賢石渠讓次撿驗是非提撕􅖥愚智指落㴟花詩成公含翠筆不停毫句寧易字意在忠有弗尚邪媚獨暢幽情偏􅞻抽􅓼雅思善戒成仁縱心匪器寸標勿嫌􅖥固難周備七步辭遠三略玄祕衝信在人誠未淪墮兵戎偃戟武帝騰輝通衢走驛結陌縈旗九江躍羽四海星威銅梁截險劍閣要機將謀敗臨敵慮徵勝懷大懼錐􅁤劣莫欺魚􅕷麗並進鶴翼雙飛赤心罔詐黃泉損期元首欣效賞職靡疑肢肱竭操佐弼天基􅁥君臣道合宜保神姿米麵柴炭養生是託蘇油石蜜鹽醋羹臛餅果喜團糖蔗􅁥噉嚼􅕷薑椒􅚿芥末煮熟斟􅞥酌恭謹敬持盤盂箸著却坐小床返沽衣角喰蘿遷位齒木梳濯牛冀塗拭洗條匙倉庫厨廳安堵釜罐刀鎗盆瓮斧􅛬箕繩素違拒敕條官司執縳養身知患逐靜林薄專崇􅁤社多遣斯村􅍉著春耕種植𭻁畒營農決油降􅝑澤梨攚施功懶夫􅝱晨霖勒土霄興鞭伏東輿驢馱馬乘排槊弓箭逆順分寸稻麻豆麥籌量斛升數計算布絹尺肘手雇價依度憑縷針綖裁縫街吟巷吼嗔㗛吉凶絶嶺新芝碧空危巒舊蘂􅚤江鮮帶宜􅞻攀折共􅝑鄙田家翁園仙樹鹿苑王城舍梨之國劫比羅城回觀戀別報望恩生雞峯隱骨龍穴潛形禪河水濬戒巘巖􅁤清俯悲塵𭻃慈和求振惠炬長榮􅍉扶關六趣開圍十冥袪除虐毒軫忍黔𬻼虗堂嚴像書寫尊經佛法處􅝩位僧佉道明當修軌轍至􅞤涅槃城袈裟瓶鉢臥貝衣裳蟲鼠恐却院灑舒張􅚤𭯪毹綾錦繡鏗鏘恥無嫌麝香讚詠歌管舞鼓笙篁學問博弄梵􅁤音彈舌悉曇莫􅋌忌願慈利􅁪潤普洽無彊旦題八百余皆審詳聊申學語欲𮩿天章因業報託形母􅝑腹無明發行􅁤試之起催名色是有六處奚開見生雖喜老死還哀憂悲始去苦惱終回如來大􅝩聖出見布國轉好為輪極斯沈溺始從鹿苑俱尸那北所演梵文數無窮極十捨為百十百曰千十千為萬拾萬曰億十億為京兆諸反載法海波瀾欲令一切離苦皆安真言密􅝩教遇之甚希有信佛子京授當觀發菩提意入灌頂壇依尊取則悉地能于想尊遍照鏡現水雲甚深密藏法道王􅁥君嚴勝金剛身青不動去牙發生春如􅗭雷吼金剛寶􅝩教溥慈弉勸如來灌頂去火珠明法性金剛觀察智母起四􅖱量心轉輪能􅖱久羯磨大明尅成衆果樂周玄英隨􅋌念具成海會曼荼􅝩聖者大􅝩日四佛波砢十六菩薩內外供養四攝自利􅝩聖佛賢􅝩聖賢劫人慈我已三業救世􅝩闍梨傳法方便真不思議重悲作謨穆佉大師最勝瑜伽持明制底依於大教曼荼密啓為利末世軌議􅁤宗讚詠諸􅝩聖近曆三賢次修拾􅝩聖歡喜離垢發光明成􅞥焰􅋌惠難勝現前達行不動善惠法雲次正妙覺如來稱大應鏡三界最尊十方莫並擁是化方生于此境號月牟尼吼李推􅝩聖從何道來總持為徑依教奉行至心頂禮師傳五部瑜伽教北平吉詳子全真記一二三四五六七八九十十一十二草百千万􅛬正月二月三月四月
